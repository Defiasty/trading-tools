{% extends "base.html" %}
{% block title %}Settings — Trading Tracker{% endblock %}
{% block content %}
<header class="top">
    <div><div class="pretitle">Settings</div><h1>Account Settings</h1><p>Set the parameters for your Topstep account.</p></div>
    <a href="{{ url_for('index') }}" class="btn">Back to Dashboard</a>
</header>
<section class="panel settings-panel">
    <form class="form" method="post">
        <label>Currency <input name="currency" value="{{ currency }}" required></label>
        <label>Starting Balance <input type="number" step="any" name="balance" value="{{ balance }}" required></label>
        <label>Profit Target <input type="number" step="any" name="profit_target" value="{{ profit_target }}" required></label>
        <label>Maximum Loss Limit <input type="number" step="any" name="max_loss_limit" value="{{ max_loss_limit }}" required></label>
        <button class="btn primary wide" type="submit">Save Settings</button>
    </form>
</section>
{% endblock %}
